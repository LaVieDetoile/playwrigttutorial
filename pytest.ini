[pytest]
addopts =
    --browser chromium
    --screenshot only-on-failure
    --video retain-on-failure
    --tracing retain-on-failure
    --html=reports/playwright-report.html
    --self-contained-html
    --strict-markers
    -ra
testpaths = tests
pythonpath = .
markers =
    smoke: critical UI checks
    regression: broader regression UI coverage
    negative: validation and error scenarios
    e2e: end-to-end purchase flow
